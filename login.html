<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access your Life Partner Connects account and connect with potential royal life partners.">
  <title>Regal Login - Life Partner Connects</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="loginLogoLink">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M2 4l3 5 7-6 7 6 3-5v14c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V4zm2 7.74V18h16v-6.26l-1.97-1.69-2.52 4.41L12 9.21l-3.51 5.25-2.52-4.41L4 11.74z"/>
          </svg>
        </div>
        <div>
          <span class="logo-text">Life Partner Connects</span>
        </div>
      </a>
      
      <div class="nav-auth-buttons">
        <a href="register.html" class="btn btn-royal" id="signUpNavBtn">Sign Up</a>
      </div>
    </div>
  </header>

  <div class="auth-card" id="loginCard">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to access your royal matchmaking profile</p>
      
      <!-- Premium Demo Login Alert Panel -->
      <div style="background: rgba(170, 124, 17, 0.08); border: 1px solid rgba(170, 124, 17, 0.3); padding: 12px 15px; border-radius: var(--border-radius); font-size: 0.8rem; color: var(--text-muted); margin-top: 15px; text-align: left; line-height: 1.5;">
        <span style="font-weight: 700; color: var(--primary-color);">Regal Demo Credentials:</span><br>
        Email: <strong style="color: var(--primary-color);">royal@lifepartnerconnects.com</strong><br>
        Password: <strong style="color: var(--primary-color);">royal123</strong>
      </div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="e.g. kunwar@lifepartnerconnects.com" required>
      </div>

      <div class="form-group">
        <label for="loginPassword">Regal Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginSubmitBtn">Access Dashboard</button>
    </form>

    <div class="auth-footer">
      <p>New to Life Partner Connects? <a href="register.html" id="registerRedirectLink">Create Noble Profile</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
