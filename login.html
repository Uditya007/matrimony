<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access your Shree Rajput Sagai Sambandh account and connect with potential royal life partners.">
  <title>Regal Login - Shree Rajput Sagai Sambandh</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="loginLogoLink">
        <img src="images/logo.jpg" class="logo-img" alt="Sagai Sambaandh Logo" />
        <div>
          <span class="logo-text">Shree Rajput Sagai Sambandh</span>
          <span class="logo-subtext">Rajput Matrimony</span>
        </div>
      </a>
      
      <div class="nav-auth-buttons">
        <a href="register.html" class="btn btn-royal" id="signUpNavBtn">Sign Up</a>
      </div>
    </div>
  </header>

  <div class="auth-card" id="loginCard">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to access your royal matchmaking profile</p>
      
      <!-- Premium Demo Login Alert Panel -->
      <div style="background: rgba(107, 18, 32, 0.08); border: 1px solid rgba(201, 162, 39, 0.3); padding: 12px 15px; border-radius: var(--border-radius); font-size: 0.8rem; color: var(--text-muted); margin-top: 15px; text-align: left; line-height: 1.5;">
        <span style="font-weight: 700; color: var(--primary-color);">Regal Demo Credentials:</span><br>
        Email: <strong style="color: var(--primary-color);">royal@sagaisambaandh.com</strong><br>
        Password: <strong style="color: var(--primary-color);">royal123</strong>
      </div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="e.g. kunwar@sagaisambaandh.com" required>
      </div>

      <div class="form-group">
        <label for="loginPassword">Regal Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="loginSubmitBtn">Access Dashboard</button>
    </form>

    <div class="auth-footer">
      <p>New to Shree Rajput Sagai Sambandh? <a href="register.html" id="registerRedirectLink">Create Noble Profile</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
